<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety & Compliance Hub | DOT Manager Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }

        /* Typography & Content Layout - Optimized for reading & Sticky Headers */
        .prose h1 { 
            @apply text-2xl md:text-3xl font-extrabold text-slate-900 leading-tight sticky z-10 bg-white/95 backdrop-blur-sm shadow-[0_10px_10px_-10px_rgba(0,0,0,0.05)] border-b border-slate-200/80;
            top: -1.5rem;
            padding-top: 1.5rem;
            padding-bottom: 1rem;
            margin-top: -1.5rem;
            margin-bottom: 1.5rem;
        }
        @media (min-width: 768px) {
            .prose h1 {
                top: -3rem;
                padding-top: 3rem;
                margin-top: -3rem;
            }
        }

        .prose h2 { @apply text-xl md:text-2xl font-bold text-slate-800 mt-12 mb-5 tracking-tight flex items-center; }
        .prose h3 { @apply text-lg font-semibold text-slate-800 mt-8 mb-3; }
        .prose p { @apply text-slate-700 mb-5 leading-relaxed text-base; }
        .prose ul:not(.checklist) { @apply list-disc list-inside mb-6 text-slate-700 space-y-3 pl-2 md:pl-4 marker:text-brand-500 text-base; }
        .prose ol { @apply list-decimal list-inside mb-6 text-slate-700 space-y-3 pl-2 md:pl-4 marker:text-brand-500 marker:font-semibold text-base; }
        .prose li strong { @apply text-slate-900 font-semibold; }
        
        /* Interactive Elements & Animations */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hover-lift { @apply transition-all duration-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-slate-200/50; }
        
        /* Modern Alerts */
        .alert-red { @apply bg-gradient-to-r from-red-50 to-white border-l-4 border-red-500 p-6 my-8 rounded-r-xl shadow-sm hover-lift; }
        .alert-blue { @apply bg-gradient-to-r from-blue-50 to-white border-l-4 border-brand-500 p-6 my-8 rounded-r-xl shadow-sm hover-lift; }
        .alert-yellow { @apply bg-gradient-to-r from-amber-50 to-white border-l-4 border-amber-500 p-6 my-8 rounded-r-xl shadow-sm hover-lift; }
        
        /* Tables */
        table { @apply w-full divide-y divide-slate-200 border border-slate-200 shadow-sm rounded-xl overflow-hidden my-8; }
        thead { @apply bg-slate-50/80 backdrop-blur-sm; }
        th { @apply px-5 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider; }
        td { @apply px-5 py-4 text-sm text-slate-700 align-top border-t border-slate-100; }
        tbody tr { @apply transition-colors duration-200; }
        tbody tr:hover { @apply bg-brand-50/40; }

        /* Progress Bar & Header */
        #progress-bar { width: 0%; transition: width 0.1s ease-out; }
        .glass-header { @apply bg-white/85 backdrop-blur-md border-b border-slate-200/80 z-20; }

        /* Copy, Check & Success Animations */
        .copied-anim { animation: pingSuccess 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pingSuccess { 0% { transform: scale(1); } 50% { transform: scale(1.3); color: #10b981; } 100% { transform: scale(1); } }
        
        .check-anim { animation: popCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popCheck { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        @keyframes successPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .progress-complete { animation: successPulse 2s infinite; }

        /* Checklist Dimming */
        .checklist-item { @apply transition-opacity duration-300; }
        .checklist-item.completed { @apply opacity-60 bg-slate-50; }

        /* Tooltips - improved for touch devices */
        .term-tooltip { @apply relative cursor-help border-b border-dashed border-slate-400 font-medium text-slate-800 hover:text-brand-600 hover:border-brand-600 transition-colors outline-none; }
        .term-tooltip .tooltip-text { @apply invisible opacity-0 w-56 bg-slate-800 text-white text-xs font-normal text-center rounded-lg py-2 px-3 absolute z-30 bottom-full left-1/2 -translate-x-1/2 mb-2 transition-all duration-200 shadow-xl pointer-events-none; }
        .term-tooltip:hover .tooltip-text, .term-tooltip:focus .tooltip-text, .term-tooltip:active .tooltip-text { @apply visible opacity-100 transform -translate-y-1; }
        .term-tooltip .tooltip-text::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; border-width: 5px; border-style: solid; border-color: #1e293b transparent transparent transparent; }
        
        /* Status Badges */
        .badge { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border; }
        .badge-green { @apply bg-green-50 text-green-700 border-green-200; }
        .badge-yellow { @apply bg-yellow-50 text-yellow-700 border-yellow-200; }
        .badge-red { @apply bg-red-50 text-red-700 border-red-200; }
        
        /* Highlight Search Term */
        mark.search-highlight { @apply bg-yellow-200 text-slate-900 rounded px-0.5 font-medium shadow-[0_0_0_1px_rgba(253,224,71,1)] scroll-mt-24; }

        /* Print Styles - Fixed Checklists rendering */
        @media print {
            body { background: white !important; overflow: auto !important; font-size: 11pt; color: black !important; }
            #sidebar, header, #back-to-top, .view-all-separator, .no-print, .print-hide { display: none !important; }
            main { margin: 0 !important; border: none !important; box-shadow: none !important; border-radius: 0 !important; }
            #content-container { overflow: visible !important; height: auto !important; padding: 0 !important; background: white !important; }
            #documents-wrapper { box-shadow: none !important; border: none !important; max-width: 100% !important; padding: 0 !important; }
            .tab-content { display: block !important; page-break-inside: auto; margin-bottom: 2rem; opacity: 1 !important; transform: none !important; animation: none !important; }
            .hover-lift { transform: none !important; box-shadow: none !important; }
            a, button { text-decoration: none !important; }
            .prose h1 { position: static !important; box-shadow: none !important; page-break-before: always; padding-top: 1rem !important; margin-top: 0 !important; color: #000; border-bottom: 2px solid #ccc; }
            #section-0 h1 { page-break-before: avoid; }
            .alert-red, .alert-blue, .alert-yellow { border: 1px solid #ccc; background: #fff !important; page-break-inside: avoid; }
            table { page-break-inside: avoid; border-collapse: collapse; }
            th, td { border: 1px solid #ddd; }
            /* Checklist specific print rules */
            .checklist { border: none !important; box-shadow: none !important; padding: 0 !important; }
            .checklist label { padding: 4px 0 !important; background: transparent !important; page-break-inside: avoid; opacity: 1 !important; }
            .checklist input[type="checkbox"] { appearance: auto; -webkit-appearance: auto; border: 1px solid #000; }
            .print-watermark { display: block !important; text-align: center; font-size: 10pt; color: #666; margin: 20px 0; font-family: monospace; border-top: 1px dashed #ccc; padding-top: 10px; }
        }
        .print-watermark { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex overflow-hidden selection:bg-brand-200 selection:text-brand-900">

    <!-- Custom Modal for Confirmation -->
    <div id="custom-modal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center bg-slate-900/60 backdrop-blur-sm transition-opacity opacity-0 no-print" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform" id="modal-content" tabindex="-1">

                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 id="modal-title" class="text-lg font-bold text-slate-900 mb-2">Очистить прогресс?</h3>
            <p class="text-sm text-slate-600 mb-6">Вы уверены, что хотите сбросить все отмеченные пункты? Это подготовит список для анкеты нового водителя.</p>
            <div class="flex justify-end space-x-3">
                <button id="modal-btn-cancel" onclick="closeModal()" class="px-4 py-2 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-slate-300">Отмена</button>
                <button id="modal-btn-confirm" onclick="executeReset()" class="px-4 py-2 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 rounded-xl shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2">Да, очистить</button>
            </div>
        </div>
    </div>

    <!-- Mobile sidebar backdrop -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 hidden lg:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-[280px] bg-[#0f172a] text-slate-300 transform -translate-x-full lg:translate-x-0 lg:static lg:inset-auto flex flex-col transition-transform duration-300 ease-in-out shadow-2xl border-r border-slate-800 no-print">
        <div class="flex items-center justify-between p-5 border-b border-slate-800/60 bg-[#0b1120]">
            <div class="flex items-center space-x-3">
                <div class="bg-brand-500/20 p-2 rounded-lg border border-brand-500/30">
                    <i class="fa-solid fa-shield-halved text-brand-400 text-xl shadow-brand-500/50"></i>
                </div>
                <span class="text-lg font-bold tracking-wide text-white">Safety <span class="text-brand-400">Hub</span></span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 rounded" aria-label="Close sidebar">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="p-4 bg-[#0f172a] sticky top-0 z-10 shadow-sm">
            <!-- Search Menu -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none transition-colors group-focus-within:text-brand-400 text-slate-500">
                    <i class="fa-solid fa-search text-sm"></i>
                </div>
                <input type="text" id="menu-search" oninput="debounceSearch()" placeholder="Поиск по тексту..." class="block w-full pl-10 pr-8 py-2.5 border border-slate-700 rounded-lg leading-5 bg-[#1e293b] text-slate-200 placeholder-slate-400 focus:outline-none focus:bg-[#0f172a] focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all text-sm shadow-inner">
                <button id="clear-search" onclick="clearSearch()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-300 hidden focus:outline-none transition-colors" aria-label="Clear search">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
            </div>
            <div id="search-stats" class="text-[10px] text-brand-400 mt-2 font-medium hidden tracking-wide">Найдено документов: 0</div>
        </div>

        <div class="flex-1 overflow-y-auto p-3 custom-scrollbar">
            <p id="menu-title" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3 px-3 transition-all">Навигация по разделам</p>
            <nav id="nav-menu" class="space-y-1" aria-label="Sidebar Navigation">
                <!-- Nav Items generated by JS -->
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800/60 bg-[#0b1120] space-y-2">
            <button onclick="toggleViewAll()" id="view-all-btn" class="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-brand-600 text-white py-2.5 px-4 rounded-xl transition-all duration-200 text-sm font-semibold shadow-md hover:shadow-brand-500/25 border border-slate-700 hover:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-400">
                <i class="fa-solid fa-layer-group"></i>
                <span>Режим "Все документы"</span>
            </button>
            <button onclick="prepareAndPrint()" class="w-full flex items-center justify-center space-x-2 bg-transparent hover:bg-slate-800 text-slate-400 hover:text-white py-2 px-4 rounded-xl transition-all duration-200 text-xs font-medium border border-transparent hover:border-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-500">
                <i class="fa-solid fa-print"></i>
                <span>Печать / Сохранить PDF</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-50 lg:rounded-l-[2rem] shadow-[-15px_0_30px_-5px_rgba(0,0,0,0.1)] border-l border-slate-200">
        
        <!-- Reading Progress Bar -->
        <div class="absolute top-0 left-0 h-1 bg-gradient-to-r from-brand-400 to-brand-600 z-50 shadow-[0_0_10px_rgba(59,130,246,0.5)] no-print" id="progress-bar"></div>

        <!-- Header -->
        <header class="glass-header px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 no-print">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="mr-3 p-2 -ml-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500 lg:hidden transition-colors" aria-label="Open sidebar">
                    <i class="fa-solid fa-bars-staggered text-lg"></i>
                </button>
                <div class="flex flex-col">
                    <h2 id="current-doc-title" class="text-xl font-bold text-slate-800 line-clamp-1 tracking-tight">Загрузка...</h2>
                    <span id="read-time" class="text-xs text-slate-500 font-medium mt-0.5"><i class="fa-regular fa-clock mr-1"></i>0 мин. чтения</span>
                </div>
            </div>
            <div class="flex items-center space-x-2 md:space-x-4">
                <!-- Mobile Quick Search Button -->
                <button onclick="openSearchMobile()" class="lg:hidden p-2 rounded-lg text-brand-600 hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors" aria-label="Search">
                    <i class="fa-solid fa-search text-lg"></i>
                </button>
                
                <div class="hidden sm:flex text-xs font-semibold text-slate-600 items-center bg-white px-3.5 py-1.5 rounded-full border border-slate-200 shadow-sm cursor-help" title="Система обновлена до последних требований FMCSA">
                    <span class="relative flex h-2 w-2 mr-2.5">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    FMCSA Compliant
                </div>
            </div>
        </header>

        <!-- Scrollable Content Area -->
        <div id="content-container" class="flex-1 overflow-y-auto p-4 md:p-8 pb-32 custom-scrollbar" onscroll="handleScroll()">
            <!-- Optimized container width (max-w-3xl) for optimal reading line length -->
            <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-12 prose relative" id="documents-wrapper">

            </div>

        <!-- Back to Top Button -->
        <button id="back-to-top" onclick="scrollToTop()" class="fixed bottom-8 right-8 bg-slate-800 hover:bg-brand-600 text-white w-12 h-12 rounded-full shadow-lg shadow-slate-400/50 flex items-center justify-center transition-all duration-300 transform translate-y-20 opacity-0 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 z-40 hover:shadow-brand-500/40 hover:-translate-y-1 no-print" aria-label="Back to top">
            <i class="fa-solid fa-arrow-up text-lg"></i>
        </button>

    </main>

    <script>
        // Data Structure for all documents
        const documents = [
            {
                id: 'doc1',
                title: 'Основы и Главные правила',
                icon: 'fa-book-open',
                readTime: 4,
                content: `
                    <h1>Полное практическое руководство для DOT Compliance Manager</h1>
                    
                    <div class="alert-blue">
                        <p class="font-bold mb-2 text-lg text-brand-900"><i class="fa-solid fa-handshake mr-2 text-brand-600"></i>Добро пожаловать в команду Safety Department!</p>
                        <p class="mb-0">Ваша роль — это не просто заполнение форм, а позиция <strong>последнего рубежа обороны</strong> компании. Вы являетесь «фильтром», который защищает бизнес от <strong>«Nuclear Verdicts»</strong> (разрушительных судебных решений) и критических нарушений, способных привести к аннулированию лицензии <span class="term-tooltip" tabindex="0">FMCSA<span class="tooltip-text">Federal Motor Carrier Safety Administration — Федеральное управление безопасности автотранспорта США.</span></span>. Помните: ваша внимательность — это залог того, что компания сохранит свой Safety Record и продолжит работу.</p>
                    </div>

                    <h2>1. Суть работы и ключевые обязанности</h2>
                    <p>Отдел Safety обеспечивает строгое соответствие деятельности компании федеральным нормам США (DOT/FMCSA). Мы готовим документацию так, чтобы при любом аудите компания выглядела безупречно. Ваши стратегические цели:</p>
                    <ul>
                        <li><strong>Защита компании:</strong> Выявление рискованных водителей до их найма.</li>
                        <li><strong>Верификация данных:</strong> Проверка подлинности документов и сопоставление фактов.</li>
                        <li><strong>Аудит истории:</strong> Обеспечение прозрачности стажа водителя с 2015 года.</li>
                    </ul>
                    <p class="mt-6 font-semibold text-slate-800">Ежедневные задачи:</p>
                    <ul>
                        <li>Мониторинг лидов в Telegram.</li>
                        <li>Первичный контакт, сохранение данных и отправка анкеты (Application).</li>
                        <li>Технический аудит заполненных данных в FleetCare Pro.</li>
                        <li>Ручная корректировка анкет на основе отчетов <span class="term-tooltip" tabindex="0">PSP<span class="tooltip-text">Pre-Employment Screening Program — История инспекций и аварий водителя за 5 лет.</span></span> / <span class="term-tooltip" tabindex="0">MVR<span class="tooltip-text">Motor Vehicle Record — История штрафов и нарушений ПДД из DMV.</span></span>.</li>
                        <li>Контроль подписания финального пакета документов.</li>
                    </ul>

                    <h2>2. Полный Workflow: от лида до утверждения</h2>
                    <p>Последовательность действий критически важна. Водители часто находятся в пути, поэтому ваша работа должна быть оперативной и профессиональной.</p>
                    <ol>
                        <li><strong>Получение лида:</strong> Номер телефона появляется в Telegram.</li>
                        <li><strong>Сохранение контакта (Важно!):</strong> Прежде чем звонить, сохраните номер в Dialpad.</li>
                        <li><strong>Первый контакт:</strong> Позвоните или напишите. Используйте стандартное приветствие:
                            <div class="relative bg-slate-50 p-5 rounded-xl border border-slate-200 my-4 group hover-lift no-print">
                                <button class="absolute top-4 right-4 text-slate-400 hover:text-brand-600 transition-colors bg-white p-2 rounded-lg shadow-sm border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500" onclick="copyText(this)" aria-label="Скопировать скрипт">
                                    <i class="fa-regular fa-copy"></i>
                                </button>
                                <div class="font-mono text-sm text-slate-700 pr-12">Hello, I’m [Your Name] from the Safety Department of [Company Name]. I've sent a link with the application to your email. Could you please fill it out as soon as you can?</div>
                            </div>
                        </li>
                        <li><strong>Отправка ссылки:</strong> В FleetCare Pro (FCP) отправьте Driver Application.</li>
                        <li><strong>Верификация:</strong> Сверьте анкету с <span class="term-tooltip" tabindex="0">CDL<span class="tooltip-text">Commercial Driver's License — Коммерческие водительские права.</span></span> и отчетами.</li>
                        <li><strong>Корректировка:</strong> Используйте статус <span class="badge badge-yellow">Need Changes</span> для правок.</li>
                        <li><strong>Подписание:</strong> После <span class="badge badge-green">Approve</span> отправьте пакет на подпись.</li>
                    </ol>

                    <h2>3. Работа в FleetCare Pro: Навигация и нюансы</h2>
                    <p>FCP — это «единый источник правды». Ошибки в навигации здесь — самая частая причина потери времени.</p>
                    <ul>
                        <li><strong>Ловушка «Drivers vs Contracts»:</strong> Анкеты новых кандидатов ищутся <strong>только в разделе Contracts</strong>.</li>
                        <li><strong>Синхронизация:</strong> Всегда нажимайте <em>Refresh</em>, чтобы увидеть актуальные данные после правок водителя.</li>
                        <li><strong>Правка Safety Policy:</strong> Удалите стандартные поля даты и вручную перетащите <em>«Date»</em> и <em>«Date Signed»</em> из боковой панели.</li>
                    </ul>

                    <h2>4. Верификация данных: Правила «Детективной работы»</h2>

                            <p class="text-sm text-slate-700 mb-3">Если водитель ведет себя агрессивно и возмущен требованиями (например, кейс Махмуда), необходимо сохранять спокойный тон и использовать аргумент:</p>
                            <div class="relative group">
                                <button class="absolute top-2 right-2 text-slate-400 hover:text-brand-600 transition-colors bg-white p-1.5 rounded-md border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500" onclick="copyText(this)" aria-label="Скопировать">
                                    <i class="fa-regular fa-copy"></i>
                                </button>
                                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 text-sm font-mono pr-8 text-slate-800">"This is a mandatory FMCSA backup requirement, not a personal whim."</div>
                            </div>
                        </div>
                        <div class="bg-white p-5 border border-slate-200 rounded-xl shadow-sm hover-lift">
                            <h4 class="font-bold text-slate-800 mb-3 flex items-center"><i class="fa-solid fa-pause text-amber-500 mr-2"></i>Тактика "Let me check"</h4>
                            <p class="text-sm text-slate-700">Используется при любых конфликтных или нестандартных вопросах, чтобы взять паузу, сохранить лицо компании и проконсультироваться с ведущим Safety-менеджером.</p>
                        </div>
                    </div>
                `
            }
        ];

        let viewAllMode = false;
        let activeQuery = '';
        let groupToReset = null;
        let searchTimeout = null;
        let scrollObserver = null;

        function init() {
            renderMenu(documents);
            updateReadTime(0);
            
            // Global keydown listeners for accessibility
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    // Close modal if open
                    if (!document.getElementById('custom-modal').classList.contains('hidden')) {
                        closeModal();
                    }
                    // Close sidebar on mobile if open
                    const sidebar = document.getElementById('sidebar');
                    if (!sidebar.classList.contains('-translate-x-full') && window.innerWidth < 1024) {
                        toggleSidebar();
                    }
                }
            });

            setTimeout(() => {
                restoreChecklists();
                updateAllChecklistProgress();
            }, 100);
        }

        // Setup Intersection Observer for ScrollSpy
        function setupScrollSpy() {
            if (scrollObserver) scrollObserver.disconnect();
            
            // Only use ScrollSpy in View All mode without an active search query
            if (!viewAllMode || activeQuery !== '') return;

            const options = {
                root: document.getElementById('content-container'),
                rootMargin: '-10% 0px -80% 0px', // Triggers when section hits the upper portion of screen
                threshold: 0
            };

            scrollObserver = new IntersectionObserver((entries) => {
                let activeEntry = null;
                
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        activeEntry = entry;
                    }
                });

                if (activeEntry) {
                    const sectionId = activeEntry.target.id;
                    const index = parseInt(sectionId.split('-')[1]);
                    updateActiveMenuState(index);
                }
            }, options);

            document.querySelectorAll('.tab-content').forEach(sec => {
                scrollObserver.observe(sec);
            });
        }

        function updateActiveMenuState(activeIndex) {
            const buttons = document.querySelectorAll('#nav-menu button');
            buttons.forEach((btn, index) => {
                if (index === activeIndex) {
                    btn.classList.add('bg-brand-600', 'text-white', 'shadow-md', 'shadow-brand-900/50');
                    btn.classList.remove('text-slate-400', 'hover:bg-[#1e293b]', 'hover:text-slate-200', 'border-transparent');
                } else {
                    btn.classList.remove('bg-brand-600', 'text-white', 'shadow-md', 'shadow-brand-900/50');
                    btn.classList.add('text-slate-400', 'hover:bg-[#1e293b]', 'hover:text-slate-200', 'border-transparent');
                }
            });
        }

        function updateReadTime(index) {
            if (viewAllMode) {
                const totalMinutes = documents.reduce((total, doc) => total + doc.readTime, 0);
                document.getElementById('read-time').innerHTML = '<i class="fa-regular fa-clock mr-1"></i>~ ' + totalMinutes + ' мин. чтения (весь гайд)';
            } else {
                const mins = documents[index].readTime;
                document.getElementById('read-time').innerHTML = '<i class="fa-regular fa-clock mr-1"></i>~ ' + mins + ' мин. чтения';
            }
        }

        function renderMenu(docsToRender) {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = ''; 
            
            if (docsToRender.length === 0) {
                navMenu.innerHTML = '<p class="text-xs text-slate-500 px-4 py-2 italic">Ничего не найдено</p>';
                return;
            }

            docsToRender.forEach((doc) => {
                const originalIndex = documents.findIndex(d => d.id === doc.id);
                const navBtn = document.createElement('button');
                
                const isActive = !viewAllMode && originalIndex === getActiveTabIndex();
                
                navBtn.className = 'w-full flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all duration-200 text-sm font-medium border border-transparent focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-1 focus:ring-offset-[#0f172a] ' + (isActive ? 'bg-brand-600 text-white shadow-md shadow-brand-900/50' : 'text-slate-400 hover:bg-[#1e293b] hover:text-slate-200 hover:border-slate-700');
                navBtn.innerHTML = '<div class="w-6 text-center opacity-80"><i class="fa-solid ' + doc.icon + '"></i></div><span class="text-left flex-1 line-clamp-2">' + doc.title + '</span>';
                navBtn.onclick = () => switchTab(originalIndex, navBtn);
                navMenu.appendChild(navBtn);
            });

            if (!viewAllMode) {
                renderContent(docsToRender);
                setTimeout(restoreChecklists, 50); 
            }
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(html, query) {
            if (!query) return html;
            
            const temp = document.createElement('div');
            temp.innerHTML = html;
            
            const walker = document.createTreeWalker(temp, NodeFilter.SHOW_TEXT, null, false);
            const nodesToReplace = [];
            const safeQuery = escapeRegExp(query);
            
            let node;
            while (node = walker.nextNode()) {
                const parent = node.parentNode;
                if (parent.nodeName !== 'SCRIPT' && 
                    parent.nodeName !== 'STYLE' && 
                    !parent.closest('button') &&
                    !parent.closest('.checklist') &&
                    !parent.closest('.tooltip-text') &&
                    node.nodeValue.trim() !== '') {
                    
                    const regex = new RegExp('(' + safeQuery + ')', 'gi');
                    if (regex.test(node.nodeValue)) {
                        nodesToReplace.push(node);
                    }
                }
            }
            
            nodesToReplace.forEach(node => {
                const span = document.createElement('span');
                const regex = new RegExp('(' + safeQuery + ')', 'gi');
                span.innerHTML = node.nodeValue.replace(regex, '<mark class="search-highlight">$1</mark>');
                node.parentNode.replaceChild(span, node);
            });
            
            return temp.innerHTML;
        }

        function scrollToFirstMatch() {
            const firstMatch = document.querySelector('mark.search-highlight');
            if (firstMatch) {
                const container = document.getElementById('content-container');
                // Calculate scroll position accounting for the sticky header
                const topPos = firstMatch.offsetTop - 120;
                container.scrollTo({ top: Math.max(0, topPos), behavior: 'smooth' });
            }
        }

        function renderContent(docsToRender) {
            const contentContainer = document.getElementById('documents-wrapper');
            contentContainer.innerHTML = '';

            const searchStats = document.getElementById('search-stats');
            
            if (activeQuery) {
                searchStats.classList.remove('hidden');
                searchStats.innerHTML = 'Найдено документов: ' + docsToRender.length;
            } else {
                searchStats.classList.add('hidden');
            }

            if (docsToRender.length === 0) {
                contentContainer.innerHTML = '<div class="text-center py-20 px-4">' +
                    '<div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">' +
                        '<i class="fa-solid fa-magnifying-glass text-slate-300 text-3xl"></i>' +
                    '</div>' +
                    '<h3 class="text-xl font-bold text-slate-800 mb-2">Ничего не найдено</h3>' +
                    '<p class="text-slate-500 text-sm max-w-sm mx-auto">К сожалению, по вашему запросу нет совпадений. Попробуйте использовать другие ключевые слова или сбросьте фильтр.</p>' +
                    '<div class="mt-6 flex flex-wrap justify-center gap-2 max-w-sm mx-auto">' +
                        '<span class="text-xs font-semibold text-slate-400 w-full mb-2 uppercase tracking-wide">Быстрые теги:</span>' +
                        '<button onclick="setSearch(\'CDL\')" class="px-4 py-1.5 bg-brand-50 hover:bg-brand-100 text-brand-700 rounded-full text-sm font-medium transition-colors border border-brand-200 focus:outline-none focus:ring-2 focus:ring-brand-500">CDL</button>' +
                        '<button onclick="setSearch(\'PSP\')" class="px-4 py-1.5 bg-brand-50 hover:bg-brand-100 text-brand-700 rounded-full text-sm font-medium transition-colors border border-brand-200 focus:outline-none focus:ring-2 focus:ring-brand-500">PSP</button>' +
                        '<button onclick="setSearch(\'SAP\')" class="px-4 py-1.5 bg-brand-50 hover:bg-brand-100 text-brand-700 rounded-full text-sm font-medium transition-colors border border-brand-200 focus:outline-none focus:ring-2 focus:ring-brand-500">SAP / Drug Test</button>' +
                        '<button onclick="setSearch(\'7 дней\')" class="px-4 py-1.5 bg-brand-50 hover:bg-brand-100 text-brand-700 rounded-full text-sm font-medium transition-colors border border-brand-200 focus:outline-none focus:ring-2 focus:ring-brand-500">Правило 7 дней</button>' +
                    '</div>' +
                    '<button onclick="clearSearch()" class="mt-8 px-6 py-2.5 bg-slate-800 text-white rounded-xl hover:bg-slate-700 text-sm font-semibold transition-colors focus:outline-none focus:ring-2 focus:ring-slate-500 shadow-md">Сбросить поиск</button>' +
                '</div>';
                return;
            }
            
            document.querySelectorAll('.print-watermark').forEach(el => el.remove());

            const dateStr = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute:'2-digit' });
            const watermarkTop = document.createElement('div');
            watermarkTop.className = 'print-watermark';
            watermarkTop.innerHTML = 'DOT Compliance Manual • Дата выгрузки: ' + dateStr;
            contentContainer.appendChild(watermarkTop);
            
            docsToRender.forEach((doc, index) => {
                const section = document.createElement('section');
                section.id = 'section-' + documents.findIndex(d => d.id === doc.id);
                section.className = 'tab-content ' + (index === 0 && !viewAllMode ? 'active' : '');
                
                if(viewAllMode) section.style.display = 'block';
                
                const processedContent = activeQuery ? highlightText(doc.content, activeQuery) : doc.content;
                section.innerHTML = processedContent;
                
                if(index > 0 && viewAllMode) {
                   const separator = document.createElement('div');
                   separator.className = 'my-16 border-t border-dashed border-slate-300 relative flex justify-center view-all-separator no-print';
                   separator.innerHTML = '<span class="bg-white px-5 text-slate-400 text-xs font-semibold absolute -top-2.5 uppercase tracking-widest rounded-full border border-slate-200 shadow-sm"><i class="fa-solid fa-link mr-1"></i>Следующий раздел</span>';
                   section.prepend(separator);
                }

                contentContainer.appendChild(section);
            });
            
            const watermarkBottom = document.createElement('div');
            watermarkBottom.className = 'print-watermark';
            watermarkBottom.innerHTML = 'Сгенерировано в системе Safety Hub • ' + dateStr;
            contentContainer.appendChild(watermarkBottom);
            
            updateAllChecklistProgress();
            
            // Re-initialize ScrollSpy after rendering
            if (viewAllMode) {
                setTimeout(setupScrollSpy, 100);
            }
            
            // Auto-scroll to search match
            if (activeQuery) {
                setTimeout(scrollToFirstMatch, 150);
            }
        }

        function setSearch(term) {
            const input = document.getElementById('menu-search');
            input.value = term;
            filterAndHighlight();
        }

        function getActiveTabIndex() {
            const sections = document.querySelectorAll('.tab-content');
            let activeIndex = 0;
            sections.forEach((sec, i) => {
                if(sec.classList.contains('active')) activeIndex = i;
            });
            return activeIndex;
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterAndHighlight, 300);
        }

        function filterAndHighlight() {
            const query = document.getElementById('menu-search').value.trim();
            const clearBtn = document.getElementById('clear-search');
            
            if (query.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }

            activeQuery = query;
            const queryLower = query.toLowerCase();
            
            const filteredDocs = documents.filter(doc => doc.title.toLowerCase().includes(queryLower) || doc.content.toLowerCase().includes(queryLower));
            
            if (query.length >= 2 && !viewAllMode) {
                viewAllMode = true;
                updateViewAllButtonState();
            }

            renderMenu(filteredDocs);
            
            if (viewAllMode || filteredDocs.length === 0) {
                renderContent(filteredDocs);
                setTimeout(restoreChecklists, 50);
            }
        }

        function clearSearch() {
            const input = document.getElementById('menu-search');
            input.value = '';
            input.focus(); 
            document.getElementById('clear-search').classList.add('hidden');
            activeQuery = '';
            
            // If they clear the search, it's better to stay in View All mode if they were there
            filterAndHighlight();
            scrollToTop(false);
        }

        function openSearchMobile() {
            if (window.innerWidth < 1024) {
                toggleSidebar();
                // Need a small delay to allow sidebar animation to start
                setTimeout(() => {
                    document.getElementById('menu-search').focus();
                }, 300);
            }
        }

        function switchTab(index, btnElement) {
            if(viewAllMode) {
                const targetId = 'section-' + index;
                const targetElement = document.getElementById(targetId);
                
                if (targetElement) {
                    const container = document.getElementById('content-container');
                    const targetPosition = targetElement.offsetTop - 20; 
                    
                    container.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                }
                
                if(window.innerWidth < 1024) toggleSidebar();
                return; 
            }
            
            document.getElementById('menu-search').value = '';
            document.getElementById('clear-search').classList.add('hidden');
            activeQuery = '';
            document.getElementById('search-stats').classList.add('hidden');
            
            updateActiveMenuState(index);

            const sections = document.querySelectorAll('.tab-content');
            sections.forEach((sec, i) => {
                sec.className = 'tab-content ' + (i === index ? 'active' : '');
            });

            document.getElementById('current-doc-title').textContent = documents[index].title;
            updateReadTime(index);
            scrollToTop(true);
            setTimeout(restoreChecklists, 50);

            if(window.innerWidth < 1024) toggleSidebar();
        }

        function updateViewAllButtonState() {
            const viewAllBtn = document.getElementById('view-all-btn');
            const menuTitle = document.getElementById('menu-title');
            
            if(viewAllMode) {
                viewAllBtn.innerHTML = '<i class="fa-solid fa-file-lines"></i><span>Режим вкладок</span>';
                viewAllBtn.classList.replace('bg-slate-800', 'bg-brand-600');
                viewAllBtn.classList.replace('hover:bg-brand-600', 'hover:bg-brand-500');
                menuTitle.textContent = "Оглавление документа";
                
                const buttons = document.querySelectorAll('#nav-menu button');
                buttons.forEach(btn => {
                    btn.className = 'w-full flex items-center space-x-3 px-3 py-2.5 rounded-lg transition-all duration-200 text-sm font-medium border border-transparent text-slate-400 hover:bg-[#1e293b] hover:text-slate-200 hover:border-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-1 focus:ring-offset-[#0f172a]';
                });
                
                document.getElementById('current-doc-title').textContent = "Вся база знаний";
                updateReadTime();
                
                // Initialize ScrollSpy if we switched to View All Mode
                setTimeout(setupScrollSpy, 100);
            } else {
                viewAllBtn.innerHTML = '<i class="fa-solid fa-layer-group"></i><span>Режим "Все документы"</span>';
                viewAllBtn.classList.replace('bg-brand-600', 'bg-slate-800');
                viewAllBtn.classList.replace('hover:bg-brand-500', 'hover:bg-brand-600');
                menuTitle.textContent = "Навигация по разделам";
                document.getElementById('search-stats').classList.add('hidden');
                
                if (scrollObserver) scrollObserver.disconnect();
            }
        }

        function toggleViewAll() {
            viewAllMode = !viewAllMode;
            updateViewAllButtonState();

            if(viewAllMode) {
                renderMenu(documents); 
                renderContent(documents); 
                setTimeout(restoreChecklists, 50);
            } else {
                document.getElementById('menu-search').value = '';
                document.getElementById('clear-search').classList.add('hidden');
                activeQuery = '';
                filterAndHighlight(); // Resets layout to tab 0
            }
            
            if(window.innerWidth < 1024 && viewAllMode) toggleSidebar();
            handleScroll(); 
        }

        function prepareAndPrint() {
            if (!viewAllMode) {
                viewAllMode = true;
                updateViewAllButtonState();
                renderContent(documents);
                setTimeout(restoreChecklists, 50);
            }
            setTimeout(() => { window.print(); }, 300);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebar-backdrop');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.remove('opacity-100');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        function handleScroll() {
            const container = document.getElementById('content-container');
            const scrollTotal = container.scrollHeight - container.clientHeight;
            const scrollTop = container.scrollTop;
            
            const progress = scrollTotal > 0 ? (scrollTop / scrollTotal) * 100 : 0;
            document.getElementById('progress-bar').style.width = progress + '%';

            const backBtn = document.getElementById('back-to-top');
            if (scrollTop > 300) {
                backBtn.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            } else {
                backBtn.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }
        }

        function scrollToTop(instant = false) {
            const container = document.getElementById('content-container');
            container.scrollTo({
                top: 0,
                behavior: instant ? 'auto' : 'smooth'
            });
        }

        // --- Custom Modal Logic for Clear Checklists ---
        function openModal(group) {
            groupToReset = group;
            const modal = document.getElementById('custom-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            void modal.offsetWidth; // Trigger reflow
            modal.classList.add('opacity-100');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
            
            // Trap focus
            setTimeout(() => document.getElementById('modal-btn-cancel').focus(), 50);
            
            // Trap Tab key inside modal
            modal.addEventListener('keydown', trapFocus);
        }

        function trapFocus(e) {
            if (e.key !== 'Tab') return;
            
            const focusableElements = document.getElementById('modal-content').querySelectorAll('button');
            const firstElement = focusableElements[0];
            const lastElement = focusableElements[focusableElements.length - 1];

            if (e.shiftKey) {
                if (document.activeElement === firstElement) {
                    lastElement.focus();
                    e.preventDefault();
                }
            } else {
                if (document.activeElement === lastElement) {
                    firstElement.focus();
                    e.preventDefault();
                }
            }
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.removeEventListener('keydown', trapFocus);
            
            modal.classList.remove('opacity-100');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                groupToReset = null;
            }, 300);
        }

        function executeReset() {
            if(!groupToReset) return;
            
            const checklistContainer = document.querySelector('.checklist[data-group="' + groupToReset + '"]');
            if(checklistContainer) {
                checklistContainer.querySelectorAll('input[type="checkbox"]').forEach(el => {
                    el.checked = false;
                    const checkId = el.getAttribute('data-id');
                    localStorage.removeItem(checkId);
                    const label = el.closest('label');
                    label.classList.remove('completed');
                    label.querySelector('span').classList.remove('line-through', 'text-slate-400');
                });
                updateChecklistProgressCounter(groupToReset);
            }
            closeModal();
        }

        // --- Checklist Logic ---
        function toggleChecklist(el) {
            const label = el.closest('label');
            const span = label.querySelector('span');
            const checkId = el.getAttribute('data-id');
            const group = el.closest('.checklist').getAttribute('data-group');
            
            if(el.checked) {
                label.classList.add('completed');
                span.classList.add('line-through', 'text-slate-400');
                localStorage.setItem(checkId, 'true');
                el.classList.add('check-anim');
                setTimeout(() => el.classList.remove('check-anim'), 300);
            } else {
                label.classList.remove('completed');
                span.classList.remove('line-through', 'text-slate-400');
                localStorage.removeItem(checkId);
            }
            
            updateChecklistProgressCounter(group);
        }

        function restoreChecklists() {
            document.querySelectorAll('.checklist input[type="checkbox"]').forEach(el => {
                const checkId = el.getAttribute('data-id');
                if(localStorage.getItem(checkId) === 'true') {
                    el.checked = true;
                    const label = el.closest('label');
                    label.classList.add('completed');
                    label.querySelector('span').classList.add('line-through', 'text-slate-400');
                }
            });
            updateAllChecklistProgress();
        }

        function updateAllChecklistProgress() {
            updateChecklistProgressCounter('base');
            updateChecklistProgressCounter('cdl');
        }

        function updateChecklistProgressCounter(group) {
            const checklistContainer = document.querySelector('.checklist[data-group="' + group + '"]');
            const progressSpan = document.getElementById('progress-' + group);
            
            if (!checklistContainer || !progressSpan) return;
            
            const total = checklistContainer.querySelectorAll('input[type="checkbox"]').length;
            const checked = checklistContainer.querySelectorAll('input[type="checkbox"]:checked').length;
            
            progressSpan.textContent = checked + ' / ' + total + ' Выполнено';
            
            if (checked === total && total > 0) {
                progressSpan.className = "progress-complete text-sm font-bold text-green-700 bg-green-50 px-3 py-1 rounded-full border border-green-300 transition-colors mt-2 sm:mt-0 shadow-sm print-hide";
                progressSpan.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Готово';
            } else {
                const color = group === 'cdl' ? 'amber' : 'brand';
                progressSpan.className = 'text-sm font-bold text-' + color + '-700 bg-' + color + '-50 px-3 py-1 rounded-full border border-' + color + '-200 transition-colors mt-2 sm:mt-0 shadow-none print-hide';
            }
        }

        // Copy logic
        function copyText(btnElement) {
            const contentDiv = btnElement.nextElementSibling;
            const textToCopy = contentDiv.innerText;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const icon = btnElement.querySelector('i');
                const originalClass = icon.className;
                
                icon.className = 'fa-solid fa-check text-green-500 copied-anim';
                btnElement.classList.add('bg-green-50', 'border-green-200');
                
                setTimeout(() => {
                    icon.className = originalClass;
                    btnElement.classList.remove('bg-green-50', 'border-green-200');
                }, 2000);
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
